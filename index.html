<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>BAYFM78 坂本真綾の『ビタミンM』</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="theme-color" content="#1c6ed5">
<link rel="manifest" href="manifest.json">

<style>
:root{
  --blue:#1c6ed5;
  --light:#e8f1fb;
}
body{
  margin:0;
  font-family:system-ui,-apple-system,BlinkMacSystemFont,sans-serif;
  background:#fff;
  color:#222;
}
.banner{
  width:100%;
  aspect-ratio:1200/300;
  background:url("title.png") center/cover no-repeat;
}
.container{
  max-width:760px;
  margin:auto;
  padding:16px;
}
h1{ font-size:20px; color:var(--blue); margin:16px 0; }
h2{
  font-size:18px;
  margin:24px 0 12px;
  border-left:5px solid var(--blue);
  padding-left:10px;
}
.status{ text-align:center; padding:16px; color:var(--blue); }
.error{ color:#c0392b; }
.retry-btn{
  margin-top:12px;
  padding:10px 14px;
  border:none;
  border-radius:8px;
  background:var(--blue);
  color:#fff;
}
ul{ list-style:none; padding:0; margin:0; }
li{
  display:flex;
  align-items:center;
  gap:12px;
  padding:14px;
  margin-bottom:10px;
  background:var(--light);
  border-radius:10px;
}
li.playing{
  border-left:6px solid var(--blue);
  background:#dcecff;
}
input[type="radio"]{
  width:22px;
  height:22px;
  accent-color:var(--blue);
}
label{ flex:1; cursor:pointer; }
.main-btn{
  padding:12px;
  font-size:15px;
  border-radius:10px;
  border:none;
  color:#fff;
}
.play-btn{ background:var(--blue); }
.offline-btn{ background:#0d3c91; }
.delete-btn{ background:#c0392b; }
.action-buttons{
  display:flex;
  gap:8px;
  margin:10px 0 20px;
}
.action-buttons .main-btn{ flex:1; }
audio{ width:100%; margin:10px 0 20px; }
.controls,.speed{
  display:flex;
  gap:8px;
  margin-bottom:10px;
}
.controls button,
.speed button{
  flex:1;
  padding:10px;
  border-radius:8px;
  border:2px solid var(--blue);
  background:#fff;
  color:var(--blue);
}
.speed button.active{
  background:var(--blue);
  color:#fff;
}
</style>
</head>

<body>
<div class="banner"></div>

<div class="container">
<h1>BAYFM78 坂本真綾の『ビタミンM』</h1>

<h2>放送回一覧</h2>
<div id="status" class="status"></div>
<ul id="mp3List"></ul>

<div class="action-buttons">
  <button id="playBtn" class="main-btn play-btn">再生</button>
  <button id="offlineBtn" class="main-btn offline-btn">保存</button>
  <button id="deleteBtn" class="main-btn delete-btn">削除</button>
</div>

<h2>再生プレイヤー</h2>

<div class="controls">
<button id="back10">－10秒</button>
<button id="forward30">＋30秒</button>
</div>

<div class="speed">
<button data-speed="1">1.0x</button>
<button data-speed="1.25">1.25x</button>
<button data-speed="1.5">1.5x</button>
</div>

<audio id="player" controls></audio>
</div>

<script>
const PROGRAM_NAME="『ビタミンM』";
const STORAGE_EPISODE="vitaminm_selected_episode";
const STORAGE_TIME_PREFIX="vitaminm_time_";
const STORAGE_SPEED="vitaminm_speed";
const STORAGE_LIST="vitaminm_episode_list";
const MP3_CACHE="vitaminm-mp3-v4";
const FETCH_TIMEOUT=8000;

const mp3List=document.getElementById("mp3List");
const statusEl=document.getElementById("status");
const playBtn=document.getElementById("playBtn");
const offlineBtn=document.getElementById("offlineBtn");
const deleteBtn=document.getElementById("deleteBtn");
const player=document.getElementById("player");
const speedButtons=document.querySelectorAll(".speed button");

let allItems=[];
let currentEpisodeKey=null;
let currentLi=null;

/* ===== 描画関数 ===== */
function renderList(items){
  mp3List.innerHTML="";
  const saved=localStorage.getItem(STORAGE_EPISODE);

  items.forEach((item,i)=>{
    const li=document.createElement("li");
    const radio=document.createElement("input");
    radio.type="radio";
    radio.name="episode";
    radio.value=i;

    if(item.episode===saved || (!saved && i===0)){
      radio.checked=true;
      currentEpisodeKey=item.episode;
    }

    radio.onchange=()=>{
      localStorage.setItem(STORAGE_EPISODE,item.episode);
      currentEpisodeKey=item.episode;
    };

    const label=document.createElement("label");
    label.textContent=`${PROGRAM_NAME} ${item.date}`;

    li.append(radio,label);
    mp3List.appendChild(li);
  });

  updateCacheMarks();
}

/* ===== 取得（耐性強化版） ===== */
async function fetchList(){

  const cached=localStorage.getItem(STORAGE_LIST);
  if(cached){
    try{
      allItems=JSON.parse(cached);
      renderList(allItems);
      statusEl.textContent="（保存済み一覧を表示中・更新確認中…）";
    }catch{
      localStorage.removeItem(STORAGE_LIST);
    }
  }else{
    statusEl.textContent="放送回一覧を取得しています…";
  }

  const controller=new AbortController();
  const timeoutId=setTimeout(()=>controller.abort(),FETCH_TIMEOUT);

  const target="https://api.allorigins.win/raw?url="+encodeURIComponent(
    "https://omny.fm/shows/bayfm-program04/playlists/maaya/embed?style=cover/playlists/podcast/embed?style=cover"
  );

  try{
    const res=await fetch(target,{signal:controller.signal});
    clearTimeout(timeoutId);
    const html=await res.text();

    const pattern = /"(?:Title|title)"\s*:\s*"([^"]+)"|(https?:\/\/[^"\s]+\.mp3)/g;

    let match;
    let currentTitle=null;
    const items=[];

    while((match=pattern.exec(html))!==null){

      if(match[1]){
        currentTitle=match[1];
      }

      if(match[2]){
        const url=match[2];

        let date="日付不明";
        let episode=null;

        if(currentTitle){
          const m=currentTitle.match(/(20\d{2})年(\d{1,2})月(\d{1,2})日/);
          if(m){
            const y=m[1];
            const mo=m[2].padStart(2,"0");
            const d=m[3].padStart(2,"0");

            episode=`${y}${mo}${d}`;
            date=`${y}年${mo}月${d}日`;
          }
        }

        items.push({url,episode,date});
      }
    }

    if(items.length===0){
      console.warn("抽出失敗：HTML構造変更の可能性あり");
    }

    const uniqueMap={};
    items.forEach(item=>{
      uniqueMap[item.url]=item;
    });

    const newItems=Object.values(uniqueMap)
      .sort((a,b)=>(b.episode||"").localeCompare(a.episode||""));

    if(JSON.stringify(newItems)!==cached){
      localStorage.setItem(STORAGE_LIST,JSON.stringify(newItems));
      allItems=newItems;
      renderList(allItems);
    }

    statusEl.textContent="";

  }catch{
    clearTimeout(timeoutId);
    if(cached){
      statusEl.textContent="⚠ 最新取得に失敗（保存済み一覧を表示中）";
    }else{
      statusEl.innerHTML=`<div class="error">取得失敗</div>
      <button class="retry-btn" onclick="location.reload()">再試行</button>`;
    }
  }
}

/* ===== 以下変更なし ===== */
async function updateCacheMarks(){
  const cache=await caches.open(MP3_CACHE);
  const items=mp3List.querySelectorAll("li");

  for(let i=0;i<allItems.length;i++){
    const res=await cache.match(allItems[i].url);
    const label=items[i].querySelector("label");
    label.textContent=`${PROGRAM_NAME} ${allItems[i].date}`;
    if(res) label.textContent+=" ✓";
  }
}

playBtn.onclick=()=>{
  const selected=mp3List.querySelector("input:checked");
  if(!selected) return;
  const item=allItems[selected.value];
  const li=mp3List.children[selected.value];

  if(currentLi) currentLi.classList.remove("playing");
  li.classList.add("playing");
  currentLi=li;

  player.src=item.url;
  currentEpisodeKey=item.episode;

  player.onloadedmetadata=()=>{
    const t=localStorage.getItem(STORAGE_TIME_PREFIX+currentEpisodeKey);
    if(t) player.currentTime=parseFloat(t);
    setSpeed(localStorage.getItem(STORAGE_SPEED)||1);
  };

  player.play();
};

offlineBtn.onclick=async()=>{
  const selected=mp3List.querySelector("input:checked");
  if(!selected) return;
  const item=allItems[selected.value];

  offlineBtn.textContent="保存中…";
  try{
    const cache=await caches.open(MP3_CACHE);
    const res=await fetch(item.url);
    await cache.put(item.url,res.clone());
    offlineBtn.textContent="保存完了 ✓";
    updateCacheMarks();
  }catch{
    offlineBtn.textContent="保存失敗";
  }
  setTimeout(()=>offlineBtn.textContent="保存",2000);
};

deleteBtn.onclick=async()=>{
  const selected=mp3List.querySelector("input:checked");
  if(!selected) return;
  const item=allItems[selected.value];

  deleteBtn.textContent="削除中…";
  try{
    const cache=await caches.open(MP3_CACHE);
    await cache.delete(item.url);

    if(player.src.includes(item.url)){
      player.pause();
      player.removeAttribute("src");
      player.load();
    }

    deleteBtn.textContent="削除完了 ✓";
    updateCacheMarks();
  }catch{
    deleteBtn.textContent="削除失敗";
  }
  setTimeout(()=>deleteBtn.textContent="削除",2000);
};

player.addEventListener("timeupdate",()=>{
  if(currentEpisodeKey){
    localStorage.setItem(
      STORAGE_TIME_PREFIX+currentEpisodeKey,
      player.currentTime
    );
  }
});

function setSpeed(s){
  player.playbackRate=s;
  localStorage.setItem(STORAGE_SPEED,s);
  speedButtons.forEach(btn=>{
    btn.classList.toggle("active",btn.dataset.speed==s);
  });
}

speedButtons.forEach(btn=>{
  btn.onclick=()=>setSpeed(btn.dataset.speed);
});

document.getElementById("back10").onclick=()=>{
  player.currentTime=Math.max(0,player.currentTime-10);
};
document.getElementById("forward30").onclick=()=>{
  if(!isNaN(player.duration)){
    player.currentTime=Math.min(player.duration,player.currentTime+30);
  }
};

fetchList();
setSpeed(localStorage.getItem(STORAGE_SPEED)||1);

if("serviceWorker" in navigator){
  navigator.serviceWorker.register("service-worker-v4.js");
}
</script>
</body>
</html>
